<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Carte Zakari</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">

    <header class="hero">
      <img
        src="assets/images/logo-zakari.png"
        alt="Zakari Brunch & Coffee"
        class="logo"
      />

      <div class="language-switch" aria-label="Choix de la langue">
        <button
          type="button"
          id="frBtn"
          class="lang active"
          data-language="fr"
        >
          FR
        </button>

        <span class="language-separator">|</span>

        <button
          type="button"
          id="enBtn"
          class="lang"
          data-language="en"
        >
          EN
        </button>
      </div>
    </header>

    <nav class="tabs">
      <button
        type="button"
        class="tab active"
        data-category="Salé"
      >
        SALÉ
      </button>

      <button
        type="button"
        class="tab"
        data-category="Sweet"
      >
        SWEET
      </button>
    </nav>

    <section class="intro">
      <p id="introText">
        Composez votre brunch selon vos envies en associant une création salée et une touche sucrée.
      </p>

      <p class="legend" id="menuLegend">
        K : Kids (10 €) • V : Végétarien • ❤️ : Coup de cœur
      </p>
    </section>

    <section id="menuContainer"></section>

  </main>

  <script src="script.js"></script>
</body>
</html>
